name: Bug Report
description: Laporkan bug di calculator
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Laporkan bug yang kamu temukan. Repo ini sandbox — bug juga bagian dari latihan!

  - type: textarea
    id: description
    attributes:
      label: Deskripsi bug
      description: Apa yang terjadi vs apa yang diharapkan?
      placeholder: "Fungsi subtract(-1, -1) menghasilkan 0, seharusnya 0..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Langkah reproduksi
      description: Langkah untuk memunculkan bug
      placeholder: |
        1. Buka src/calculator.py
        2. Jalankan subtract(-1, -1)
        3. Lihat hasilnya
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Versi Python
      placeholder: "3.12"
    validations:
      required: false
